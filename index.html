<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Victim Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.22.0"
  }
}
</script>
<style>
  /* ── Design Tokens ─────────────────────────────────────── */
  :root {
    --navbar-height: 56px;
    --sidebar-width: 280px;

    /* Dark palette */
    --color-bg:        #0f172a;
    --color-surface:   #1e293b;
    --color-surface-2: #334155;
    --color-border:    rgba(71, 85, 105, 0.6);
    --color-text:      #e2e8f0;
    --color-text-muted:#94a3b8;
    --color-accent:    #0ea5e9;
    --color-accent-dk: #0284c7;
    --color-danger:    #ef4444;
    --color-success:   #22c55e;

    /* Radius */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;

    /* Shadow */
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.25);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.35);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.50);

    /* Transition */
    --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
    --duration-fast: 150ms;
    --duration-normal: 250ms;
    --duration-slow: 320ms;
  }

  /* ── Base ──────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Custom Scrollbar ──────────────────────────────────── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(148, 163, 184, 0.22);
    border-radius: 99px;
    transition: background var(--duration-fast);
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.45); }

  /* ── Sidebar Drawer ────────────────────────────────────── */
  .sidebar-drawer {
    transition: transform var(--duration-slow) var(--ease-standard);
    will-change: transform;
  }

  /* ── Overlay ───────────────────────────────────────────── */
  .modal-overlay {
    transition: opacity var(--duration-normal) var(--ease-standard);
  }

  /* ── Focus Ring ────────────────────────────────────────── */
  :focus-visible {
    outline: 2px solid var(--color-accent);
    outline-offset: 2px;
    border-radius: var(--radius-sm);
  }

  /* ── Modal content container ───────────────────────────── */
  .modal-panel {
    animation: modal-in var(--duration-normal) var(--ease-standard) both;
  }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.97) translateY(6px); }
    to   { opacity: 1; transform: scale(1)    translateY(0); }
  }
</style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
